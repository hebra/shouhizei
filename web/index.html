<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="Shouhizei — A simple GST/VAT calculator for international tax rates."
    >
    <title>Shouhizei — GST/VAT Calculator</title>
    <link rel="icon" href="assets/shouhizei.png" type="image/png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap"
      rel="stylesheet"
    >

    <!-- Styles -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">

    <!-- Inline script to prevent FOUC (Flash of Unstyled Content) -->
    <script>
      (function () {
        const storedTheme = localStorage.getItem("theme");
        const theme = storedTheme ||
          (globalThis.matchMedia &&
              globalThis.matchMedia("(prefers-color-scheme: dark)")
                .matches
            ? "dark"
            : "light");
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-top">
          <div class="header-brand">
            <img
              src="assets/shouhizei.png"
              alt="Shouhizei Logo"
              class="logo"
              width="32"
              height="32"
            >
            <h1>Shouhizei — GST/VAT Calculator</h1>
          </div>
          <button
            id="theme-toggle"
            class="theme-toggle"
            aria-label="Toggle dark mode"
          >
            <svg
              class="sun-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg
              class="moon-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
        </div>
        <div class="header-accent"></div>
      </header>

      <main class="main-layout">
        <section class="calculator-inputs">
          <form id="calculator-form" novalidate>
            <div class="input-group">
              <label class="input-label" for="country-select">Country</label>
              <select id="country-select" name="country">
                <option value="">Select a country...</option>
              </select>
            </div>

            <div class="input-group">
              <label class="input-label" for="tax-rate" id="tax-rate-label"
              >Tax Rate (%)</label>
              <input
                type="number"
                id="tax-rate"
                name="tax-rate"
                placeholder="0.00"
                min="0"
                max="100"
                step="0.01"
                required
              >
            </div>

            <div class="input-group input-group-divider">
              <label class="input-label" for="price-without-tax"
              >Price (Excluding Tax)</label>
              <div class="input-wrapper">
                <span class="input-prefix" id="price-excl-prefix"></span>
                <input
                  type="number"
                  id="price-without-tax"
                  name="price-without-tax"
                  placeholder="0.00"
                  min="0"
                  step="0.01"
                >
              </div>
            </div>

            <div class="input-group">
              <label class="input-label" for="price-with-tax"
              >Price (Including Tax)</label>
              <div class="input-wrapper">
                <span class="input-prefix" id="price-incl-prefix"></span>
                <input
                  type="number"
                  id="price-with-tax"
                  name="price-with-tax"
                  placeholder="0.00"
                  min="0"
                  step="0.01"
                >
              </div>
            </div>

            <button type="reset" id="reset-button">Clear All</button>
          </form>
        </section>

        <section class="results">
          <div class="results-card" aria-live="polite">
            <div class="results-header">
              <span class="results-label">Breakdown</span>
              <div class="results-summary">
                <span class="summary-label">Price (Including Tax):</span>
                <div class="summary-value-wrapper">
                  <span class="summary-value" id="res-incl-tax">0.00</span>
                  <button
                    class="copy-btn"
                    data-target="res-incl-tax"
                    aria-label="Copy Price Including Tax"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="16"
                      height="16"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      aria-hidden="true"
                    >
                      <rect x="9" y="9" width="13" height="13" rx="2" ry="2">
                      </rect>
                      <path
                        d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
                      >
                      </path>
                    </svg>
                  </button>
                </div>
              </div>
              <div class="results-summary">
                <span class="summary-label" id="res-tax-label"
                >Tax Amount:</span>
                <div class="summary-value-wrapper">
                  <span class="summary-value" id="res-tax-value">0.00</span>
                  <button
                    class="copy-btn"
                    data-target="res-tax-value"
                    aria-label="Copy Tax Amount"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="16"
                      height="16"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      aria-hidden="true"
                    >
                      <rect x="9" y="9" width="13" height="13" rx="2" ry="2">
                      </rect>
                      <path
                        d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
                      >
                      </path>
                    </svg>
                  </button>
                </div>
              </div>
              <div class="results-summary">
                <span class="summary-label">Price (Excluding Tax):</span>
                <div class="summary-value-wrapper">
                  <span class="summary-value" id="res-excl-tax">0.00</span>
                  <button
                    class="copy-btn"
                    data-target="res-excl-tax"
                    aria-label="Copy Price Excluding Tax"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="16"
                      height="16"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      aria-hidden="true"
                    >
                      <rect x="9" y="9" width="13" height="13" rx="2" ry="2">
                      </rect>
                      <path
                        d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
                      >
                      </path>
                    </svg>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>

      <footer>
        <p>
          All rates are standard percentages.
        </p>
      </footer>
    </div>

    <!-- Scripts -->
    <div id="toast-container" class="toast-container" aria-live="assertive">
    </div>
    <script src="js/theme.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/calculator.js"></script>
  </body>
</html>
